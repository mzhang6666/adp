version: '3.8'

services:

  dataflow-dev:
    build:
      context: .
      dockerfile: Dockerfile.dataflow-dev
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        USERNAME: ${USERNAME:-devuser}
    container_name: dataflow-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 工作目录
      - ../..:/workspace
      - ./data/sysvol:/sysvol
      - ./data/conf:/conf
      # 主机用户目录映射到容器用户目录，保持配置一致性
      - ${HOME:-~}:/home/${USERNAME:-devuser}
      - ${HOME:-~}/go-1.24:/home/${USERNAME:-devuser}/go
    depends_on:
      # - mongodb
      - mariadb
      - redis
      - kafka
      - oss-gateway-backend

  # mongodb:
  #   image: mongo:7
  #   container_name: mongodb
  #   restart: unless-stopped
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - ./data/mongodb:/data/db
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: admin
  #     MONGO_INITDB_ROOT_PASSWORD: admin123

  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - ./data/mariadb:/var/lib/mysql
      - ../..:/workspace
    environment:
      MARIADB_ROOT_PASSWORD: root123

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:

      KAFKA_HEAP_OPTS: "-Xms128M -Xmx256M"
      KAFKA_NUM_NETWORK_THREADS: 2
      KAFKA_NUM_IO_THREADS: 4
      KAFKA_LOG_CLEANER_DEDUPE_BUFFER_SIZE: 2097152
  
      # KRaft 模式配置
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # 监听器配置 - 支持 SASL 认证
      KAFKA_LISTENERS: CLIENT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: CLIENT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CLIENT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: CLIENT
      # SASL 认证配置
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      # JAAS 配置
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/secrets/kafka_server_jaas.conf"
      # 其他配置
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - ./data/kafka:/var/lib/kafka/data
      - ./kafka_server_jaas.conf:/etc/kafka/secrets/kafka_server_jaas.conf:ro


