  oss-gateway-backend:
    image: oss-gateway-backend:latest
    container_name: oss-gateway-backend
    ports:
      - "9200:8080"
    environment:
      - RDSHOST=mariadb
      - RDSPORT=3306
      - RDSUSER=root
      - RDSPASS=root123
      - RDSDBNAME=adp
      - DB_TYPE=MYSQL
      - REDISCLUSTERMODE=standalone
      - REDISHOST=redis
      - REDISPORT=6379
      - REDISUSER=
      - REDISPASS=
      - REDIS_DB=2
