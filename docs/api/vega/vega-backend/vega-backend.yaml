basePath: /api/vega-backend/v1
definitions:
  interfaces.AccountInfo:
    properties:
      id:
        type: string
      name:
        type: string
      type:
        type: string
    type: object
  interfaces.CatalogRequest:
    properties:
      connector_config:
        $ref: '#/definitions/interfaces.ConnectorConfig'
        description: 加密存储的连接配置（JSON格式），根据connector_type包含不同的连接参数
      connector_type:
        type: string
        description: 数据源类型，如mysql, mariadb, opensearch等
      description:
        type: string
        maxLength: 1000
        description: 目录描述，最大1000字符
      name:
        type: string
        maxLength: 255
        minLength: 1
        description: 目录名称，系统一级命名空间，catalog下唯一，最大255字符
      tags:
        items:
          type: string
          maxLength: 40
          minLength: 1
        maxItems: 5
        type: array
        description: 标签列表，用于分类和检索，最多5个，每个标签最大40字符
    required:
      - name
      - connector_type
    type: object
  interfaces.Catalog:
    properties:
      id:
        description: catalog唯一标识，最大40字符
        type: string
      name:
        description: 目录名称，系统一级命名空间，catalog下唯一，最大255字符
        type: string
      tags:
        description: 标签，逗号分隔，用于分类和检索，最大255字符
        items:
          type: string
        type: array
      description:
        description: 目录描述，最大1000字符
        type: string
      type:
        description: 目录类型，physical表示物理目录（连接真实数据源），logical表示逻辑目录
        enum: [physical, logical]
        type: string
      enabled:
        description: 是否启用，true表示启用，false表示禁用
        type: boolean
      connector_type:
        description: 数据源类型，如mysql, mariadb, opensearch, kafka, elasticsearch, api, prometheus等
        type: string
      connector_config:
        $ref: '#/definitions/interfaces.ConnectorConfig'
      metadata:
        description: 自动发现的元数据（JSON格式），如数据库版本等
        type: object
      health_check_enabled:
        description: 是否启用健康检查，true表示启用，false表示禁用
        type: boolean
      health_check_status:
        description: 连接状态，healthy表示健康，degraded表示降级，unhealthy表示不健康，offline表示离线，disabled表示已禁用
        enum: [healthy, degraded, unhealthy, offline, disabled]
        type: string
      last_check_time:
        description: 最后健康检查时间，Unix时间戳（毫秒）
        type: integer
      health_check_result:
        description: 健康检查结果详情，包含检查过程中的具体信息
        type: string
      creator:
        $ref: '#/definitions/interfaces.AccountInfo'
        description: 创建者信息，包含id、type、name
      create_time:
        description: 创建时间，Unix时间戳（毫秒）
        type: integer
      updater:
        $ref: '#/definitions/interfaces.AccountInfo'
        description: 更新者信息，包含id、type、name
      update_time:
        description: 最后更新时间，Unix时间戳（毫秒）
        type: integer
      operations:
        description: 可执行的操作列表，如["read", "write", "delete"]
        items:
          type: string
        type: array
    type: object
  interfaces.ConnectorConfig:
    additionalProperties: {}
    type: object
    description: |
      Connector configuration varies by data source type. Below are the parameters for each type:

      **MySQL:**
      - host (string, required): MySQL服务器主机地址
      - port (integer, required): MySQL服务器端口，范围1-65535
      - username (string, required): 数据库用户名
      - password (string, required): 数据库密码
      - databases (array, optional): 数据库名称列表，每个数据库名最大64字符。如果为空，则连接到实例级别
      - options (object, optional): 连接参数，如charset、timeout等

      **MariaDB:**
      - host (string, required): MariaDB服务器主机地址
      - port (integer, required): MariaDB服务器端口，范围1-65535
      - username (string, required): 数据库用户名
      - password (string, required): 数据库密码
      - databases (array, optional): 数据库名称列表，每个数据库名最大64字符。如果为空，则连接到实例级别
      - options (object, optional): 连接参数，如charset、timeout等
      
      **PostgreSQL:**
      - host (string, required): PostgreSQL服务器主机地址
      - port (integer, required): PostgreSQL服务器端口，范围1-65535
      - username (string, required): 数据库用户名
      - password (string, required): 数据库密码
      - database (string, required): 要连接的数据库名称，数据库名最大63字符
      - schemas (array, optional): 模式名称列表，每个模式名最大63字符。如果为空，则连接到实例级别
      - options (object, optional): 连接参数，如sslmode、connect_timeout、applicati

      **OpenSearch:**
      - host (string, required): OpenSearch服务器主机地址
      - port (integer, required): OpenSearch服务器端口
      - username (string, optional): 认证用户名
      - password (string, optional): 认证密码
      - index_pattern (string, optional): 索引匹配模式，如log-*
  interfaces.DiscoverResult:
    properties:
      catalog_id:
        type: string
      message:
        type: string
      new_count:
        type: integer
      stale_count:
        type: integer
      unchanged_count:
        type: integer
    type: object
  interfaces.DiscoverTask:
    properties:
      catalog_id:
        type: string
      create_time:
        type: integer
      creator:
        $ref: '#/definitions/interfaces.AccountInfo'
      finish_time:
        description: 完成时间
        type: integer
      id:
        type: string
      message:
        type: string
      progress:
        description: 0-100
        type: integer
      result:
        $ref: '#/definitions/interfaces.DiscoverResult'
      start_time:
        description: 开始执行时间
        type: integer
      status:
        description: pending/running/completed/failed
        type: string
      trigger_type:
        description: manual/scheduled
        type: string
    type: object
  interfaces.Property:
    properties:
      description:
        type: string
      display_name:
        type: string
      features:
        items:
          $ref: '#/definitions/interfaces.PropertyFeature'
        type: array
      name:
        type: string
      original_name:
        type: string
      type:
        type: string
    type: object
  interfaces.ResourceDataQueryParams:
    properties:
      filter_condition: {}
      limit:
        type: integer
      need_total:
        type: boolean
      offset:
        type: integer
      output_fields:
        description: 指定输出的字段列表
        items:
          type: string
        type: array
      sort:
        items:
          $ref: '#/definitions/interfaces.SortField'
        type: array
    type: object
  interfaces.ResourceRequest:
    properties:
      catalog_id:
        description: 所属catalog ID，最大40字符
        type: string
      category:
        description: 数据资源类型，table表示表，file表示文件，fileset表示文件集，api表示API服务，metric表示时序数据，topic表示消息队列主题，index表示索引，logicview表示逻辑视图，dataset表示数据集
        enum: [table, file, fileset, api, metric, topic, index, logicview, dataset]
        type: string
      database:
        description: 所属数据库名称（实例级Catalog时使用），最大128字符
        type: string
      description:
        maxLength: 1000
        description: 数据资源描述，最大1000字符
        type: string
      name:
        maxLength: 255
        minLength: 1
        description: 数据资源名称，catalog下唯一，最大255字符
        type: string
      schema_definition:
        description: Schema定义（JSON数组格式，包含所有字段信息），每个字段包含name、type、description、type_config等属性
        items:
          $ref: '#/definitions/interfaces.Property'
        type: array
      source_identifier:
        description: 源端标识（表名/文件路径/索引名等），最大500字符
        type: string
      status:
        description: 数据资源状态，active表示活跃，disabled表示已禁用，deprecated表示已废弃，stale表示已过期
        enum: [active, disabled, deprecated, stale]
        type: string
      tags:
        items:
          maxLength: 40
          minLength: 1
          type: string
        maxItems: 5
        description: 标签列表，JSON数组格式，用于分类和检索，最多5个，每个标签最大40字符
        type: array
      logic_definition:
        description: 逻辑定义（JSON数组格式，仅在category为logicview时使用）
        items:
          $ref: '#/definitions/interfaces.LogicDefinitionNode'
        type: array
    required:
      - catalog_id
      - name
      - category
    type: object
  interfaces.Resource:
    properties:
      id:
        description: resource唯一标识，最大40字符
        type: string
      catalog_id:
        description: 所属catalog ID，最大40字符
        type: string
      name:
        description: 数据资源名称，catalog下唯一，最大255字符
        type: string
      tags:
        description: 标签，JSON数组格式，用于分类和检索，最大255字符
        items:
          type: string
        type: array
      description:
        description: 数据资源描述，最大1000字符
        type: string
      category:
        description: 数据资源类型，table表示表，file表示文件，fileset表示文件集，api表示API服务，metric表示时序数据，topic表示消息队列主题，index表示索引，logicview表示逻辑视图，dataset表示数据集
        enum: [table, file, fileset, api, metric, topic, index, logicview, dataset]
        type: string
      status:
        description: 数据资源状态，active表示活跃，disabled表示已禁用，deprecated表示已废弃，stale表示已过期
        enum: [active, disabled, deprecated, stale]
        type: string
      status_message:
        description: 状态说明，最大500字符
        type: string
      database:
        description: 所属数据库名称（实例级连接时使用），最大128字符
        type: string
      source_identifier:
        description: 源端标识（表名/文件路径/索引名等），最大500字符
        type: string
      source_metadata:
        description: 源端元数据（JSON格式），包含源端配置信息
        type: object
      schema_definition:
        description: Schema定义（JSON数组格式，包含所有字段信息），每个字段包含name、type、description、type_config、source_name、source_type、is_native、is_primary、is_nullable、default_value、ordinal_position等属性
        items:
          $ref: '#/definitions/interfaces.Property'
        type: array
      creator:
        $ref: '#/definitions/interfaces.AccountInfo'
        description: 创建者信息，包含id、type、name
      create_time:
        description: 创建时间，Unix时间戳（毫秒）
        type: integer
      updater:
        $ref: '#/definitions/interfaces.AccountInfo'
        description: 更新者信息，包含id、type、name
      update_time:
        description: 最后更新时间，Unix时间戳（毫秒）
        type: integer
      operations:
        description: 可执行的操作列表，如["read", "write", "delete"]
        items:
          type: string
        type: array
      logic_type:
        description: 逻辑类型，derived表示衍生，composite表示复合
        enum: [derived, composite]
        type: string
      logic_definition:
        description: 逻辑定义
        items:
          $ref: '#/definitions/interfaces.LogicDefinitionNode'
        type: array
    type: object
  interfaces.ConnectorTypeReq:
    properties:
      type:
        description: connector类型，唯一标识，最大40字符
        type: string
      name:
        maxLength: 255
        minLength: 1
        description: 类型名称，如mysql, postgresql, kafka等，最大255字符
        type: string
      description:
        maxLength: 1000
        description: 类型描述，最大1000字符
        type: string
      category:
        description: 分类，table表示关系型数据库，index表示搜索引擎，topic表示消息队列，file表示文件，fileset表示文件集，metric表示时序数据库，api表示API服务
        enum: [table, index, topic, file, fileset, metric, api]
        type: string
      mode:
        description: 模式，local表示内置在vega-backend进程内运行，remote表示作为独立服务运行，通过HTTP调用
        enum: [local, remote]
        type: string
      enabled:
        description: 是否启用，true表示启用，false表示禁用
        type: boolean
      connector_config_schema:
        description: 字段配置列表（JSON数组格式，定义连接配置的结构），每个字段包含name、type、description、required、encrypted等属性
        type: object
      tags:
        items:
          maxLength: 40
          minLength: 1
          type: string
        maxItems: 5
        description: 标签，JSON数组格式，用于分类和检索，最多5个，每个标签最大40字符
        type: array
    required:
      - type
      - name
      - category
      - mode
    type: object
  interfaces.QueryExecuteRequest:
    properties:
      query_id:
        description: 必填，同一轮查询一致
        minLength: 1
        type: string
      tables:
        description: 表列表
        items:
          $ref: '#/definitions/interfaces.TableInQuery'
        minItems: 1
        type: array
      joins:
        description: JOIN 定义；单表时为空
        items:
          $ref: '#/definitions/interfaces.JoinSpec'
        type: array
      output_fields:
        description: 输出列，可带表别名
        items:
          type: string
        type: array
      filter_condition:
        description: 过滤条件
        type: object
      sort:
        description: 排序
        items:
          $ref: '#/definitions/interfaces.SortField'
        type: array
      offset:
        description: 分页偏移
        minimum: 0
        type: integer
      limit:
        description: 每页条数，最大 10000
        maximum: 10000
        minimum: 1
        type: integer
      need_total:
        description: 是否返回总条数
        type: boolean
    required:
      - query_id
      - tables
    type: object
  interfaces.QueryExecuteResponse:
    properties:
      query_id:
        description: 后端生成或回传，用于后续分页
        type: string
      entries:
        description: 查询结果数据
        items:
          type: object
        type: array
      total_count:
        description: 总条数（仅在need_total为true时返回）
        type: integer
      next_offset:
        description: 下一页偏移量
        type: integer
      has_more:
        description: 是否还有更多数据
        type: boolean
    type: object
  interfaces.TableInQuery:
    properties:
      resource_id:
        type: string
      alias:
        type: string
    type: object
  interfaces.JoinSpec:
    properties:
      type:
        description: inner, left, right, full
        enum: [inner, left, right, full]
        type: string
      left_table_alias:
        minLength: 1
        type: string
      right_table_alias:
        minLength: 1
        type: string
      on:
        description: JOIN ON 条件
        items:
          $ref: '#/definitions/interfaces.JoinOnCond'
        minItems: 1
        type: array
    required:
      - type
      - left_table_alias
      - right_table_alias
      - on
    type: object
  interfaces.JoinOnCond:
    properties:
      left_field:
        type: string
      right_field:
        type: string
    type: object
  interfaces.SortField:
    properties:
      direction:
        type: string
      field:
        type: string
    type: object
  interfaces.LogicDefinitionNode:
    properties:
      id:
        type: string
      name:
        type: string
      type:
        type: string
        enum: [resource, join, union, sql, output]
      inputs:
        items:
          type: string
        type: array
        description: 输入节点ID列表
      config:
        type: object
        description: |
          节点配置。根据type不同分别对应:
          - resource: interfaces.ResourceNodeCfg
          - join: interfaces.JoinNodeCfg
          - union: interfaces.UnionNodeCfg
          - sql: interfaces.SQLNodeCfg
      output_fields:
        items:
          $ref: '#/definitions/interfaces.ViewProperty'
        type: array
    type: object
  interfaces.ViewProperty:
    properties:
      description:
        type: string
      display_name:
        type: string
      features:
        items:
          $ref: '#/definitions/interfaces.PropertyFeature'
        type: array
      name:
        type: string
        description: 字段名。如果是 "*" 则表示通配符，透传上游所有字段。
      original_name:
        type: string
      type:
        type: string
      from:
        type: object
        description: |
          映射配置。
          - Join映射模式：字符串（源字段名）
          - Union对齐模式：对象数组 interfaces.OutputFieldRef
      from_node:
        type: string
        description: 源节点ID
    type: object
  interfaces.PropertyFeature:
    properties:
      config:
        type: object
      description:
        type: string
      display_name:
        type: string
      feature_type:
        type: string
        description: 特性类型：keyword, fulltext, vector
      is_default:
        type: boolean
      is_native:
        type: boolean
      name:
        type: string
      ref_property:
        type: string
    type: object
  interfaces.OutputFieldRef:
    properties:
      from:
        type: string
      from_node:
        type: string
    type: object
  interfaces.ResourceNodeCfg:
    properties:
      resource_id:
        type: string
      filters:
        $ref: '#/definitions/interfaces.FilterCondCfg'
      distinct:
        type: boolean
    type: object
  interfaces.JoinNodeCfg:
    properties:
      join_type:
        type: string
        enum: [inner, left, right, "full outer"]
      join_on:
        items:
          $ref: '#/definitions/interfaces.JoinOn'
        type: array
      filters:
        $ref: '#/definitions/interfaces.FilterCondCfg'
    type: object
  interfaces.JoinOn:
    properties:
      left_field:
        type: string
      right_field:
        type: string
      operator:
        type: string
    type: object
  interfaces.UnionNodeCfg:
    properties:
      union_type:
        type: string
        enum: [all, distinct]
      filters:
        $ref: '#/definitions/interfaces.FilterCondCfg'
    type: object
  interfaces.SQLNodeCfg:
    properties:
      sql:
        type: string
    type: object
  interfaces.FilterCondCfg:
    properties:
      field:
        type: string
      operation:
        type: string
      sub_conditions:
        items:
          $ref: '#/definitions/interfaces.FilterCondCfg'
        type: array
      value_from:
        type: string
        enum: [const, field, user]
      value:
        type: object
      real_value:
        type: object
    type: object
info:
  contact:
    name: kweaver.ai
    url: https://kweaver.ai
  description: VEGA Backend API Documentation
  title: VEGA Backend API
  version: "1.0"
paths:
  /health:
    get:
      consumes:
        - application/json
      description: Health check endpoint to verify server status
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
        - health
  /catalogs:
    get:
      consumes:
        - application/json
      description: Get a list of catalogs with pagination and filters
      parameters:
        - description: Tag filter
          in: query
          maxLength: 40
          name: tag
          type: string
        - description: Type filter
          in: query
          name: type
          type: string
        - description: Health check status filter
          in: query
          name: health_check_status
          type: string
        - description: Offset for pagination
          in: query
          minimum: 0
          name: offset
          type: integer
          default: 0
        - description: Limit for pagination
          in: query
          maximum: 1000
          minimum: 1
          name: limit
          type: integer
          default: 20
        - description: Sort field
          enum: [name, update_time]
          in: query
          name: sort
          type: string
        - description: Sort direction
          enum: [asc, desc]
          in: query
          name: direction
          type: string
          default: desc
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              entries:
                description: List of catalogs
                items:
                  $ref: '#/definitions/interfaces.Catalog'
                type: array
              total_count:
                description: Total number of catalogs
                type: integer
            type: object
        "400":
          description: Bad Request
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            type: object
        "500":
          description: Internal Server Error
          schema:
            type: object
      summary: List catalogs
      tags:
        - catalogs
    post:
      consumes:
        - application/json
      description: Create a new catalog
      parameters:
        - description: Catalog information
          in: body
          name: catalog
          required: true
          schema:
            $ref: '#/definitions/interfaces.CatalogRequest'
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            properties:
              id:
                description: Catalog ID
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            type: object
        "409":
          description: Conflict
          schema:
            type: object
        "500":
          description: Internal Server Error
          schema:
            type: object
      summary: Create catalog
      tags:
        - catalogs
  /catalogs/{id}:
    put:
      consumes:
        - application/json
      description: Update a catalog by ID
      parameters:
        - description: Catalog ID
          in: path
          name: id
          required: true
          type: string
        - description: Catalog information
          in: body
          name: catalog
          required: true
          schema:
            $ref: '#/definitions/interfaces.CatalogRequest'
      produces:
        - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            type: object
        "409":
          description: Conflict
          schema:
            type: object
        "500":
          description: Internal Server Error
          schema:
            type: object
      summary: Update catalog
      tags:
        - catalogs
  /catalogs/{id}/discover:
    post:
      consumes:
        - application/json
      description: Trigger discovery of resources in a catalog
      parameters:
        - description: Catalog ID
          in: path
          name: id
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              id:
                description: Discovery task ID
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            type: object
        "500":
          description: Internal Server Error
          schema:
            type: object
      summary: Discover catalog resources
